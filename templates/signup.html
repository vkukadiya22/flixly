<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>Sign up | Flixly</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>
  <div class="auth-wrapper">
    <div class="auth-card">
      <div class="text-center mb-4">
        <img src="{{ url_for('static', filename='images/flixly_logo.png') }}" height="50" class="mb-3">
        <h4 class="m-0">Reserve Your Seat</h4>
      </div>

      {% if error %}
      <div class="alert alert-danger py-2">{{ error }}</div>
      {% endif %}

      <form method="post">
        <div class="mb-3">
          <label class="form-label">Name</label>
          <input type="text" name="name" class="form-control" placeholder="Your name" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input type="email" name="email" class="form-control" placeholder="you@example.com" required>
        </div>
        <div class="mb-3">
          <label class="form-label">Password</label>
          <input type="password" name="password" class="form-control" placeholder="Choose a strong password" required>
        </div>
        <button type="submit" class="btn btn-auth w-100">Sign up</button>
      </form>

      <div class="text-center mt-3">
        Already have an account?
        <a class="auth-link" href="{{ url_for('signin') }}">Sign in</a>
      </div>
    </div>
  </div>
</body>

</html>
