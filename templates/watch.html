<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <title>{{ video.title }} | Flixly</title>

  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
  <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">
</head>

<body>

  <div class="player-wrapper">

    <!-- TOP BAR -->
    <div class="top-bar">
      <button class="back-btn" onclick="history.back()">
        <i class="bi bi-arrow-left"></i>
      </button>

      <span class="player-title">{{ video.title }}</span>
    </div>

    <!-- VIDEO -->
    <video id="videoPlayer" autoplay data-start-time="{{ start_time|default(0) }}"
      data-id="{{ current_episode_id if mode == 'series' else video.id }}" data-type="{{ mode }}"
      onerror="console.error('Video Error:', this.error); alert('Video failed to load. Check browser console (F12) for details.');">
      <source src="{{ url_for('stream_video', filename=video.trailer) }}" type="video/mp4">
    </video>

    <!-- SEEK ANIMATION -->
    <div id="seekLeft" class="seek-indicator left">
      <i class="bi bi-rewind-fill"></i>
    </div>
    <div id="seekRight" class="seek-indicator right">
      <i class="bi bi-fast-forward-fill"></i>
    </div>

    <!-- CENTER ICON -->
    <div id="centerIcon" class="center-icon">
      <i class="bi bi-pause-fill"></i>
    </div>

    <!-- CONTROLS -->
    <div class="controls">
      <div class="progress-wrapper">
        <input type="range" id="progressBar" value="0">
        <span id="remainingTime" class="remaining-time">00:00</span>
      </div>

      <div class="controls-row">

        <!-- LEFT -->
        <div class="left-controls">
          <button id="back10"><i class="bi bi-rewind-fill"></i></button>
          <button id="playPause"><i class="bi bi-pause-fill"></i></button>
          <button id="forward10"><i class="bi bi-fast-forward-fill"></i></button>

          <div class="volume-wrapper">
            <button id="muteBtn"><i class="bi bi-volume-up-fill"></i></button>
            <input type="range" id="volumeBar" min="0" max="1" step="0.01" value="1">
          </div>
        </div>

        <!-- RIGHT -->
        <div class="right-controls">

          <!-- 🔥 SERIES ICON (ONLY IF SERIES) -->
          {% if mode == "series" %}
          <button id="seriesPanelBtn" title="Episodes & Seasons">
            <i class="bi bi-collection-play"></i>
          </button>
          {% endif %}

          <button id="fullscreenBtn">
            <i class="bi bi-arrows-fullscreen"></i>
          </button>
        </div>

      </div>
    </div>

    <!-- ===============================
       SERIES PANEL (RIGHT SIDE)
       =============================== -->
    {% if mode == "series" %}
    <div id="seriesPanel" class="series-panel">

      <div id="seasonHeader" class="season-header">Season {{ current_season }}</div>

      <div id="seasonList" class="season-list">
        {% for s in seasons %}
        <div class="season-chip {% if s == current_season %}active{% endif %}" data-season="{{ s }}">Season {{ s }}
        </div>
        {% endfor %}
      </div>

      <div id="episodeList" class="episode-list">
        {% for ep in episodes %}
        <a class="episode-item {% if current_episode_id == ep.id %}active{% endif %}"
          href="/watch/series/{{ series_id }}?season={{ current_season }}&episode={{ ep.id }}">
          <span class="episode-number">{{ ep.episode_number }}</span>
          <span class="episode-title">{{ ep.title }}</span>
        </a>
        {% endfor %}
      </div>

    </div>
    {% endif %}

  </div>

  <script src="{{ url_for('static', filename='js/main.js') }}"></script>



  {% if mode == "series" %}
  <script>
    const panelBtn = document.getElementById("seriesPanelBtn");
    const panel = document.getElementById("seriesPanel");
    const seasonHeader = document.getElementById("seasonHeader");
    const seasonList = document.getElementById("seasonList");

    panelBtn.onclick = () => {
      panel.style.display = panel.style.display === "block" ? "none" : "block";
    };

    seasonHeader.onclick = () => {
      seasonList.style.display = seasonList.style.display === "block" ? "none" : "block";
    };

    document.querySelectorAll(".season-chip").forEach(item => {
      item.onclick = async () => {
        const season = item.dataset.season;
        document.querySelectorAll(".season-chip").forEach(s => s.classList.remove("active"));
        item.classList.add("active");
        const res = await fetch(`/api/series/{{ series_id }}/episodes?season=${season}`);
        const data = await res.json();
        const list = document.getElementById("episodeList");
        list.innerHTML = data.map(ep => `
        <a class="episode-item"
           href="/watch/series/{{ series_id }}?season=${season}&episode=${ep.id}">
          <span class="episode-number">${ep.episode_number}</span>
          <span class="episode-title">${ep.title}</span>
        </a>
      `).join("");
      };
    });
  </script>
  {% endif %}

</body>

</html>
