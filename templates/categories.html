<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Flixly - Categories</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <link rel="stylesheet" href="{{ url_for('static', filename='css/style.css') }}">

</head>

<body>
    {% import 'macros.html' as macros %}
    {{ macros.navbar('categories') }}
    {{ macros.profile_modals() }}

    <div class="container-fluid" style="padding-top: 80px;">
        <h2 class="section-title ms-5 mt-4">Browse by Category</h2>
    </div>

    <div class="category-grid">
        {% for genre in genres %}
        <a href="{{ url_for('category_view', name=genre) }}" class="category-card cat-{{ loop.index0 % 6 }}">
            <span>{{ genre }}</span>
        </a>
        {% endfor %}
    </div>

    <script src="{{ url_for('static', filename='js/main.js') }}"></script>
</body>

</html>
